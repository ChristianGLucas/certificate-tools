# Axiom flow — composes published nodes into a graph.
# Local composability check: split a PEM bundle, then parse the first resulting
# certificate block — a real, meaningful two-node composition within this package.
name: cert-compose-check
description: "Split a PEM bundle then parse its first certificate."

nodes:
  - alias: split
    package: christiangeorgelucas/certificate-tools@0.1.0
    node: SplitPemBundle
  - alias: parse
    package: christiangeorgelucas/certificate-tools@0.1.0
    node: ParseCertificate

edges:
  - from: split
    to: parse
    adapter:
      "certificates[0].pem": pem

# start: split                 # optional — inferred when one node has no incoming edge
